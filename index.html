    <script>
        // =====================================================================
        // CENTRAL DE CONFIGURAÇÃO DE MÍDIA DO CRIADOR (SR. JOSÉ)
        // =====================================================================
        const CONFIG_CRIADOR = {
            musica_fundo: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/media/jdp_1780579450006_music_zapsplat_game_music_medium_action_electronic_techno_style_fun_020.mp3",

        };

        // CONFIGURAÇÕES DE CONEXÃO DO BANCO DE DADOS UNIFICADO (LEOVARDIOS BURGUER 2026)
        const LOJA_ID = "LEOVARDIOS_burguer_2026";
        const firebaseConfig = { 
            apiKey: "AIzaSyCEdXF7ScnMYz0Ce0OW-B_UJ8Bm5Pl9m8o",
            databaseURL: "https://dony-burguers-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // NÚCLEO DE ÁUDIO INDUSTRIAL HELENA
        let bgMusic = null;
        let isMuted = false;

        function initAudio() {
            if (!bgMusic) {
                bgMusic = new Audio(CONFIG_CRIADOR.musica_fundo);
                bgMusic.loop = true;
                bgMusic.volume = 0.4; 
            }
        }

        function playMusic() {
            initAudio();
            if (!isMuted) {
                bgMusic.play().catch(err => {
                    console.log("Aguardando interação do operador para iniciar áudio.");
                });
            }
        }

        function toggleSound() {
            initAudio();
            isMuted = !isMuted;
            const btn = document.getElementById('sound-btn');
            if (isMuted) {
                bgMusic.pause();
                btn.innerHTML = '<i class="fas fa-volume-mute text-red-500"></i>';
                btn.style.borderColor = "#ef4444";
            } else {
                bgMusic.play();
                btn.innerHTML = '<i class="fas fa-volume-up animate-pulse text-cyan-400"></i>';
                btn.style.borderColor = "#06b6d4";
            }
        }

        // TABELA DE SÍMBOLOS OFICIAIS DO FORTUNE TIGER
        const SYMBOLS = {
            0: { img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1780134898787_68e52fdd68ba6.png", mult: 3, weight: 40 },
            1: { img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1780134959162_68e52fe681896.png", mult: 5, weight: 30 },
            2: { img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1780135023011_68e52fecc8ad2.png", mult: 8, weight: 15 },
            3: { img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1780135023011_68e52fecc8ad2.png", mult: 10, weight: 10 },
            4: { img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1780135105584_1001200033.png", mult: 15, weight: 6 },
            5: { img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1780135105584_1001200033.png", mult: 20, weight: 4 },
            6: { img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1780135157092_1001200034.png", mult: 250, weight: 2 } // TIGRE WILD
        };

        let user = null, isSpinning = false, bet = 0.25;
        let lastMatrix = [[0,1,2], [3,4,5], [6,0,1]];

        window.onload = () => {
            // Prepara a foto de ganhos do Criador em tela cheia na inicialização
            document.getElementById('win-bg-layer').style.backgroundImage = `url('${CONFIG_CRIADOR.fundo_tela_ganhos}')`;

            const urlParams = new URLSearchParams(window.location.search);
            const whatsSalvo = urlParams.get('u') || localStorage.getItem('jdp_cliente_whatsapp');

            if (whatsSalvo) {
                localStorage.setItem('jdp_cliente_whatsapp', whatsSalvo);
                document.getElementById('login-screen').style.display = 'none';
                document.documentElement.classList.add('session-active');
                syncClientState(whatsSalvo);
            } else {
                document.getElementById('login-screen').style.display = 'flex';
            }
        };

        // REGISTRO DE OPERADOR UNIFICADO (COMUNICAÇÃO DIRETA COM AS MISSÕES)
        function registerSession() {
            const name = document.getElementById('user-name-input').value.trim();
            const phone = document.getElementById('user-phone-input').value.replace(/\D/g, "");

            if (!name || !phone) {
                alert("Por favor, preencha os dados para conexão.");
                return;
            }

            localStorage.setItem('jdp_cliente_nome', name.toUpperCase());
            localStorage.setItem('jdp_cliente_whatsapp', phone);
            document.getElementById('login-screen').style.display = 'none';
            document.documentElement.classList.add('session-active');

            // Dispara áudio na primeira interação do login
            playMusic();

            db.ref(`lojas/${LOJA_ID}/usuarios/${phone}`).get().then(snap => {
                if (!snap.exists()) {
                    db.ref(`lojas/${LOJA_ID}/usuarios/${phone}`).set({
                        nome: name.toUpperCase(),
                        whatsapp: phone,
                        endereco: "ENTREGA CENTRAL",
                        donycoins: 10.00, 
                        currentUnlocked: 1,
                        data_cadastro: Date.now(),
                        status_missao: "nenhuma"
                    });
                }
                syncClientState(phone);
            });
        }

        // SINCRONIZAÇÃO EM TEMPO REAL DAS MOEDAS DO PAINEL DE MISSÕES (donycoins)
        function syncClientState(phone) {
            db.ref(`lojas/${LOJA_ID}/usuarios/${phone}`).on('value', snap => {
                const data = snap.val();
                if (!data) return;
                user = { id: phone, ...data };
                document.getElementById('balance').innerText = (data.donycoins || 0).toFixed(2);
                renderStatic();
            });
        }

        function renderStatic() {
            for(let i=0; i<3; i++) {
                const est = document.getElementById(`reel-${i}`);
                est.innerHTML = lastMatrix[i].map(id => `<div class="slot-box"><img src="${SYMBOLS[id].img}"></div>`).join('');
                gsap.set(est, { y: 0 });
            }
        }

        function adjBet(v) { 
            if(!isSpinning) { 
                bet = Math.max(0.25, Math.round((bet + v) * 100) / 100); 
                document.getElementById('bet-display').innerText = bet.toFixed(2); 
            } 
        }

        // LÓGICA DE SOMA MILIMÉTRICA JDP
        function checkWin(matrix) {
            let total = 0;
            let lines = [];
            const paths = [
                [[0,0],[1,0],[2,0]], 
                [[0,1],[1,1],[2,1]], 
                [[0,2],[1,2],[2,2]], 
                [[0,0],[1,1],[2,2]], 
                [[0,2],[1,1],[2,0]]
            ];

            paths.forEach((path, idx) => {
                const s = path.map(p => matrix[p[0]][p[1]]);
                const firstNonWild = s.find(id => id !== 6);
                const target = firstNonWild !== undefined ? firstNonWild : 6;

                if (s.every(id => id === target || id === 6)) {
                    total += (bet / 5) * SYMBOLS[target].mult;
                    lines.push(idx);
                }
            });

            // MULTIPLICADOR TELA CHEIA 10x
            const flat = matrix.flat();
            const first = flat.find(id => id !== 6) || 6;
            if (flat.every(id => id === first || id === 6)) total *= 10;

            return { total, lines };
        }

        function getWeighted() {
            const tw = Object.values(SYMBOLS).reduce((a, b) => a + b.weight, 0);
            let r = Math.random() * tw;
            for (let id in SYMBOLS) {
                if (r < SYMBOLS[id].weight) return parseInt(id);
                r -= SYMBOLS[id].weight;
            }
            return 0;
        }

        async function masterSpinProcess() {
            if(isSpinning || user.donycoins < bet) return;
            isSpinning = true;
            document.getElementById('spin-btn').disabled = true;
            document.getElementById('svg-lines').style.display = 'none';

            // Ativa rotação PG Soft no botão de spin completo
            document.getElementById('spin-btn').classList.add('active-rotation');

            // 1. DÉBITO IMEDIATO ATÔMICO
            await db.ref(`lojas/${LOJA_ID}/usuarios/${user.id}/donycoins`).transaction(c => (c || 0) - bet);

            // 2. DECISÃO DETERMINÍSTICA DO SERVIDOR
            const winSnap = await db.ref(`lojas/${LOJA_ID}/win_mode`).once('value');
            const forceWin = winSnap.val() === true;
            let result;

            if(forceWin) {
                const id = [4,5][Math.floor(Math.random()*2)];
                result = [[id,id,id], [id,id,id], [id,id,id]];
                db.ref(`lojas/${LOJA_ID}/win_mode`).set(false);
            } else {
                result = Array.from({length:3}, () => Array.from({length:3}, () => getWeighted()));
            }

            const winData = checkWin(result);
            const STRIPS = 60;

            // 3. MOVIMENTO DA ESTEIRA
            for(let i=0; i<3; i++) {
                const est = document.getElementById(`reel-${i}`);
                let html = lastMatrix[i].map(id => `<div class="slot-box"><img src="${SYMBOLS[id].img}"></div>`).join('');
                                
                for(let s=0; s<STRIPS; s++) {
                    const id = (s >= STRIPS-3) ? result[i][s-(STRIPS-3)] : getWeighted();
                    html += `<div class="slot-box"><img src="${SYMBOLS[id].img}"></div>`;
                }
                est.innerHTML = html;

                gsap.to(est, {
                    y: -(STRIPS * 120),
                    duration: 2.5 + (i * 0.5),
                    ease: "power4.out",
                    onComplete: () => { if(i === 2) finalizeMaster(winData, result); }
                });
            }
        }

        async function finalizeMaster(data, matrix) {
            isSpinning = false;
            document.getElementById('spin-btn').disabled = false;
            
            // Desativa rotação do botão de spin
            document.getElementById('spin-btn').classList.remove('active-rotation');
            
            lastMatrix = matrix;

            if(data.total > 0) {
                document.getElementById('svg-lines').style.display = 'block';
                document.querySelectorAll('line').forEach(l => l.style.display = 'none');
                data.lines.forEach(id => document.getElementById('l'+id).style.display = 'block');

                // CRÉDITO NO FIREBASE (DONYCOINS)
                await db.ref(`lojas/${LOJA_ID}/usuarios/${user.id}/donycoins`).transaction(c => (c || 0) + data.total);

                setTimeout(() => {
                    document.getElementById('win-val').innerText = "R$ " + data.total.toFixed(2);
                    document.getElementById('win-screen').style.display = 'flex';
                }, 500);
            }
            renderStatic();
        }
    </script>
