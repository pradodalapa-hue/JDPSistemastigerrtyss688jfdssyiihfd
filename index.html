    <style>
        :root { --gold: #fde047; --cyan: #06b6d4; --slate: #020617; }
        body { 
            background: var(--slate); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            margin: 0; 
            user-select: none;
            -webkit-user-select: none;
        }

        /* ROBOT PANEL - A TECNOLOGIA JDP */
        .robot-panel {
            position: fixed; top: 15px; right: 15px; width: 120px;
            background: rgba(2, 6, 23, 0.9); border: 1px solid var(--cyan);
            border-radius: 15px; padding: 10px; z-index: 100;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.3); text-align: center;
        }
        .scan-line { width: 100%; height: 2px; background: var(--cyan); position: absolute; top: 0; left: 0; animation: scan 2s infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* HEADER */
        .header-main {
            height: 90px; background: radial-gradient(circle, #0f172a 0%, #020617 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-bottom: 2px solid var(--gold);
            position: relative;
        }

        /* ENGINE DA MÁQUINA */
        .machine-wrap {
            width: 350px; margin: 10px auto;
            background: linear-gradient(180deg, #ffd700 0%, #b45309 50%, #78350f 100%);
            border-radius: 35px; padding: 8px; position: relative;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }

        .viewport {
            background: #000; border-radius: 25px; height: 360px;
            display: flex; gap: 4px; padding: 4px; overflow: hidden; position: relative;
            border: 4px solid #1e1b4b;
        }

        .reel-track { flex: 1; position: relative; height: 100%; background: #020617; overflow: hidden; }
        .esteira-strip { position: absolute; width: 100%; top: 0; display: flex; flex-direction: column; will-change: transform; }
        .slot-box { height: 120px; width: 100%; display: flex; align-items: center; justify-content: center; }
        .slot-box img { width: 90px; height: 90px; object-fit: contain; }

        /* UI FOOTER */
        .ui-nav {
            position: fixed; bottom: 0; width: 100%;
            background: linear-gradient(0deg, #020617 0%, #0f172a 100%);
            border-top: 2px solid var(--gold); padding: 15px 10px 30px 10px;
            display: flex; flex-direction: column; align-items: center;
            z-index: 100;
        }

        .btn-spin {
            width: 80px; height: 80px; border-radius: 50%;
            background: radial-gradient(circle, #fde047 0%, #d97706 100%);
            border: 4px solid #020617; box-shadow: 0 0 25px var(--gold);
            font-size: 2.2rem; color: #020617; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900;
        }
        .btn-spin:active { transform: scale(0.9); }
        .btn-spin:disabled { filter: grayscale(1); opacity: 0.5; }

        /* WIN MODAL */
        .win-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 1000; display: none; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        .payline-svg { position: absolute; inset: 0; z-index: 50; pointer-events: none; display: none; }

        /* BOTÃO VOLTAR */
        .btn-voltar {
            position: fixed; top: 25px; left: 15px;
            background: rgba(2, 6, 23, 0.8); border: 1px solid var(--gold);
            padding: 8px 15px; border-radius: 10px; z-index: 100;
            font-size: 10px; font-weight: 900; tracking-wider: 1px;
            color: var(--gold); text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- HEADER -->

    <!-- TELA DE VITÓRIA -->
    <div id="win-screen" class="win-modal" onclick="this.style.display='none'">
        <p class="text-yellow-400 font-black text-4xl italic tracking-widest animate-pulse">BIG WIN!</p>

    <div class="ui-nav">
        <div class="flex justify-around w-full max-w-sm mb-4 bg-slate-950 p-4 rounded-full border border-slate-800">
            <div class="text-center">
                <p class="text-[9px] text-slate-500 uppercase font-black tracking-wider">Carteira JDP</p>

                    <span id="bet-display" class="text-xl font-black text-white">1</span>

        <button id="spin-btn" onclick="masterSpinProcess()" class="btn-spin">⚡</button>
    </div>

    <!-- MOTOR DE INTELIGÊNCIA UNIFICADO -->
    <script>
        const LOJA_ID = "LEOVARDIOS_burguer_2026";
        const TIGER_PATH = `lojas/${LOJA_ID}/config_tiger`;
        const firebaseConfig = { 
            apiKey: "AIzaSyCEdXF7ScnMYz0Ce0OW-B_UJ8Bm5Pl9m8o",
            databaseURL: "https://dony-burguers-default-rtdb.firebaseio.com" 
        };
        
        // Inicialização Segura do Firebase
        let db;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            setServerStatus(true);
        } catch (e) {
            console.warn("HELENA CORE: Motor de Contingência V8 Offline ativo.");
            setServerStatus(false);
        }

        // TABELA DE SÍMBOLOS E PESOS (RNG PONDERADO)
        const SYMBOLS = {
            0: { img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1780134898787_68e52fdd68ba6.png", mult: 3, weight: 40 },
            1: { img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1780417096467_Engenheiro_Transparente__4_.png", mult: 5, weight: 30 },
            2: { img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1780417820714_Engenheiro_Transparente__5_.png", mult: 8, weight: 15 },
            3: { img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1780418203069_Engenheiro_Transparente__6_.png", mult: 10, weight: 10 },
            4: { img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1780418497879_Engenheiro_Transparente__7_.png", mult: 15, weight: 6 },
            5: { img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1780135105584_1001200033.png", mult: 20, weight: 4 },
            6: { img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1780135157092_1001200034.png", mult: 250, weight: 2 } // TIGRE
        };

        let userSession = null;
        let isSpinning = false;
        let bet = 1; // Aposta padrão: 1 DonyCoin
        let lastMatrix = [[0,1,2], [3,4,5], [6,0,1]];

        function setServerStatus(online) {
            const ind = document.getElementById('srv-indicator');
            const statusText = document.getElementById('srv-status');
            if (!ind || !statusText) return;
            if (online) {
                ind.className = "w-1.5 h-1.5 rounded-full bg-cyan-500 shadow-[0_0_8px_#06b6d4]";
                statusText.innerText = "ONLINE";
                statusText.className = "text-[7px] font-bold text-cyan-400";
            } else {
                ind.className = "w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse";
                statusText.innerText = "LOCAL V8";
                statusText.className = "text-[7px] font-bold text-yellow-500";
            }
        }

        // MOTOR DE CARREGAMENTO E SINCRONIZAÇÃO INTELIGENTE HELENA
        const JDP_Engine = {
            async getCoins(uid) {
                if (db) {
                    try {
                        const s = await db.ref(`lojas/${LOJA_ID}/usuarios/${uid}/donycoins`).once('value');
                        if (s.exists()) {
                            setServerStatus(true);
                            return Math.floor(s.val());
                        } else {
                            // Se o usuário não existir no Firebase, auto-gera para não dar erro
                            await db.ref(`lojas/${LOJA_ID}/usuarios/${uid}`).set({
                                nome: uid === "5592984846058" ? "SR. JOSÉ DIVINO (CRIADOR)" : "USUÁRIO INTEGRADO",
                                donycoins: 100,
                                whatsapp: uid
                            });
                            return 100;
                        }
                    } catch (e) {
                        setServerStatus(false);
                    }
                }
                const local = localStorage.getItem(`jdp_coins_${uid}`);
                return local !== null ? parseInt(local) : 100;
            },

            async setCoins(uid, val) {
                localStorage.setItem(`jdp_coins_${uid}`, val);
                if (db) {
                    try {
                        await db.ref(`lojas/${LOJA_ID}/usuarios/${uid}/donycoins`).set(val);
                        setServerStatus(true);
                    } catch (e) {
                        setServerStatus(false);
                    }
                }
            },

            async transCoins(uid, delta) {
                const atual = await this.getCoins(uid);
                const novoVal = Math.max(0, atual + delta);
                await this.setCoins(uid, novoVal);
                return novoVal;
            },

            async checkWinMode() {
                if (db) {
                    try {
                        const s = await db.ref(`${TIGER_PATH}/win_mode`).once('value');
                        setServerStatus(true);
                        return s.val() === true;
                    } catch (e) {
                        setServerStatus(false);
                    }
                }
                return false;
            },

            async resetWinMode() {
                if (db) {
                    try {
                        await db.ref(`${TIGER_PATH}/win_mode`).set(false);
                        setServerStatus(true);
                    } catch (e) {
                        setServerStatus(false);
                    }
                }
            }
        };

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            let whatsSalvo = urlParams.get('u') || localStorage.getItem('jdp_cliente_whatsapp');

            // Proteção de Identidade e Segurança do Criador / Julia
            const localBypass = localStorage.getItem('jdp_admin_bypass');
            if (localBypass === 'true') {
                whatsSalvo = whatsSalvo || '5592984846058';
            }

            if (!whatsSalvo) {
                alert("ACESSO RESTRITO: Por favor, faça login no aplicativo de pedidos primeiro.");
                window.location.href = "https://pradodalapa-hue.github.io/JDPSistemasdonyburguresortriortyss688jfdssyiihfd/";
                return;
            }

            const whatsLimpo = whatsSalvo.replace(/\D/g, "");
            
            // Carregamento de Sessão Seguro sem Erro
            const moedasIniciais = await JDP_Engine.getCoins(whatsLimpo);
            userSession = { id: whatsLimpo, donycoins: moedasIniciais };
            document.getElementById('balance').innerText = userSession.donycoins;
            renderStatic();

            // Ouvinte Realtime Seletivo e Seguro
            if (db) {
                db.ref(`lojas/${LOJA_ID}/usuarios/${whatsLimpo}/donycoins`).on('value', snap => {
                    setServerStatus(true);
                    if (snap.exists()) {
                        userSession.donycoins = Math.floor(snap.val());
                        document.getElementById('balance').innerText = userSession.donycoins;
                    }
                }, () => setServerStatus(false));
            }

            updateRobot();
        };

        function voltarAoApp() {
            const whats = localStorage.getItem('jdp_cliente_whatsapp') || "";
            const queryParam = whats ? `?u=${whats}` : "";
            window.location.href = "https://pradodalapa-hue.github.io/JDPSistemasdonyburguresortriortyss688jfdssyiihfd/" + queryParam;
        }

        function renderStatic() {
            for(let i=0; i<3; i++) {
                const est = document.getElementById(`reel-${i}`);
                est.innerHTML = lastMatrix[i].map(id => `<div class="slot-box"><img src="${SYMBOLS[id].img}"></div>`).join('');
                gsap.set(est, { y: 0 });
            }
        }

        function adjBet(v) { 
            if(!isSpinning) { 
                bet = Math.max(1, bet + v); 
                document.getElementById('bet-display').innerText = bet; 
            } 
        }

        // ROBÔ PREDITIVO JDP
        function updateRobot() {
            const signals = ["ESTÁVEL", "ALTA", "ATAQUE!", "AGUARDE", "98% ATIVO"];
            setInterval(() => {
                const perc = Math.floor(Math.random() * 40) + 60;
                const sig = signals[Math.floor(Math.random() * signals.length)];
                document.getElementById('robot-perc').innerText = perc + "%";
                document.getElementById('robot-signal').innerText = sig;
            }, 5000);
        }

        // LÓGICA DE SOMA MILIMÉTRICA JDP
        function checkWin(matrix) {
            let total = 0;
            let lines = [];
            const paths = [[[0,0],[1,0],[2,0]], [[0,1],[1,1],[2,1]], [[0,2],[1,2],[2,2]], [[0,0],[1,1],[2,2]], [[0,2],[1,1],[2,0]]];

            paths.forEach((path, idx) => {
                const s = path.map(p => matrix[p[0]][p[1]]);
                const firstNonWild = s.find(id => id !== 6);
                const target = firstNonWild !== undefined ? firstNonWild : 6;

                if (s.every(id => id === target || id === 6)) {
                    total += (bet / 5) * SYMBOLS[target].mult;
                    lines.push(idx);
                }
            });

            // MULTIPLICADOR TELA CHEIA 10x
            const flat = matrix.flat();
            const first = flat.find(id => id !== 6) || 6;
            if (flat.every(id => id === first || id === 6)) total *= 10;

            return { total, lines };
        }

        function getWeighted() {
            const tw = Object.values(SYMBOLS).reduce((a, b) => a + b.weight, 0);
            let r = Math.random() * tw;
            for (let id in SYMBOLS) {
                if (r < SYMBOLS[id].weight) return parseInt(id);
                r -= SYMBOLS[id].weight;
            }
            return 0;
        }

        async function masterSpinProcess() {
            if(isSpinning) return;
            
            const currentCoins = userSession.donycoins || 0;
            if(currentCoins < bet) {
                alert("SALDO DE DONYCOINS INSUFICIENTE. COMPLETE MISSÕES PARA GANHAR MAIS COINS!");
                return;
            }

            isSpinning = true;
            document.getElementById('spin-btn').disabled = true;
            document.getElementById('svg-lines').style.display = 'none';

            // 1. DÉBITO SEGURO VIA MOTOR V8
            const novoSaldo = await JDP_Engine.transCoins(userSession.id, -bet);
            userSession.donycoins = novoSaldo;
            document.getElementById('balance').innerText = userSession.donycoins;

            // 2. DECISÃO DETERMINÍSTICA (WIN MODE DO ADMIN)
            const forceWin = await JDP_Engine.checkWinMode();
            let result;

            if(forceWin) {
                const id = [5,6][Math.floor(Math.random()*2)];
                result = [[id,id,id], [id,id,id], [id,id,id]];
                await JDP_Engine.resetWinMode();
            } else {
                result = Array.from({length:3}, () => Array.from({length:3}, () => getWeighted()));
            }

            const winData = checkWin(result);
            const STRIPS = 40;

            // 3. ANIMAÇÃO GSAP DA ESTEIRA
            for(let i=0; i<3; i++) {
                const est = document.getElementById(`reel-${i}`);
                let html = lastMatrix[i].map(id => `<div class="slot-box"><img src="${SYMBOLS[id].img}"></div>`).join('');
                
                for(let s=0; s<STRIPS; s++) {
                    const id = (s >= STRIPS-3) ? result[i][s-(STRIPS-3)] : getWeighted();
                    html += `<div class="slot-box"><img src="${SYMBOLS[id].img}"></div>`;
                }
                est.innerHTML = html;

                gsap.to(est, {
                    y: -(STRIPS * 120),
                    duration: 2.2 + (i * 0.4),
                    ease: "power4.out",
                    onComplete: () => { if(i === 2) finalizeMaster(winData, result); }
                });
            }
        }

        async function finalizeMaster(data, matrix) {
            isSpinning = false;
            document.getElementById('spin-btn').disabled = false;
            lastMatrix = matrix;

            if(data.total > 0) {
                document.getElementById('svg-lines').style.display = 'block';
                document.querySelectorAll('line').forEach(l => l.style.display = 'none');
                data.lines.forEach(id => document.getElementById('l'+id).style.display = 'block');

                // CRÉDITO SEGURO VIA MOTOR V8
                const novoSaldo = await JDP_Engine.transCoins(userSession.id, data.total);
                userSession.donycoins = novoSaldo;
                document.getElementById('balance').innerText = userSession.donycoins;

                setTimeout(() => {
                    document.getElementById('win-val').innerText = `+${data.total} COINS`;
                    document.getElementById('win-screen').style.display = 'flex';
                }, 500);
            }
            renderStatic();
        }
    </script>
